name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Tauri Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Frontend first — Tauri's cargo build needs the Vite output in `dist/`.
      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm tsc --noEmit
        run: pnpm tsc --noEmit

      - name: pnpm build
        run: pnpm build

      # Rust check chain across the workspace.
      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --workspace

      - name: cargo build
        working-directory: src-tauri
        run: cargo build --workspace

      # Windows-only: smoke-test the gmm-loader FFI binding against the
      # vendored 3dmloader.dll. Builds victim.exe + noop_dll.dll first,
      # then runs `cargo xtask test-loader` which loads the DLL, installs
      # the CBT hook, spawns victim, waits for injection, and unhooks.
      - name: cargo xtask test-loader
        if: runner.os == 'Windows'
        run: cargo xtask test-loader

  # Aggregator: branch protection keys off this single name.
  check:
    name: check
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify matrix succeeded
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "matrix build did not all succeed (result=${{ needs.build.result }})"
            exit 1
          fi
